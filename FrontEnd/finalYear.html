<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emote Bro | Affective Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-neutral: #050506; --accent: #06b6d4; --glass: rgba(20, 20, 25, 0.8); }
        .theme-happy { --bg-current: #06241c; --accent: #10b981; }
        .theme-sad { --bg-current: #0a1128; --accent: #3b82f6; }
        .theme-frustrated { --bg-current: #240a0a; --accent: #ef4444; }
        .theme-surprised { --bg-current: #24180a; --accent: #f59e0b; }
        
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #phone-wrapper { width: 100%; height: 100%; background: var(--bg-current, var(--bg-neutral)); transition: background 1.5s ease; display: flex; flex-direction: column; position: relative; }

        /* Sidebar & Modals */
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #0a0a0c; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(255,255,255,0.1); padding: 60px 20px 20px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(4px); }
        .sidebar-overlay.open { display: block; }
        #menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 210; width: 45px; height: 45px; background: var(--glass); border-radius: 12px; display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        #menu-toggle span { width: 20px; height: 2px; background: white; border-radius: 2px; transition: 0.3s; }

        #privacy-modal { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(15px); }
        .modal-content { background: #0f172a; border: 1px solid rgba(6, 182, 212, 0.3); padding: 35px; border-radius: 40px; max-width: 350px; text-align: center; transform: scale(0.9); transition: 0.4s; }
        #privacy-modal.show { display: flex; }
        #privacy-modal.show .modal-content { transform: scale(1); }

        /* App Main UI */
        #app { display: none; flex: 1; flex-direction: column; height: 100%; width: 100%; padding: 15px; gap: 10px; box-sizing: border-box; justify-content: space-between; }
        .panel-vision { flex: 2; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .view-circle { width: 45vw; height: 45vw; max-width: 220px; max-height: 220px; border-radius: 50%; overflow: hidden; border: 3px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .panel-advice { flex: 1.2; min-height: 100px; background: var(--glass); backdrop-filter: blur(30px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; align-items: center; justify-content: center; overflow-y: auto; text-align: center; }
        .panel-input { flex-shrink: 0; background: var(--glass); backdrop-filter: blur(30px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 12px; margin-bottom: env(safe-area-inset-bottom, 10px); }

        .control-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 1.2rem; }
        .control-btn.active { background: var(--accent); border-color: white; box-shadow: 0 0 20px var(--accent); }
        
        #user-text { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; width: 100%; outline: none; text-align: center; color: white; font-size: 16px; }
        #mood-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.4em; margin-top: 10px; color: var(--accent); text-transform: uppercase; }

        #onboarding { position: absolute; inset: 0; z-index: 50; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .loader-dots { display: inline-block; animation: blink 1.4s infinite both; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="theme-neutral">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="sidebar">
        <h3 class="text-xs font-black tracking-widest text-slate-500 mb-6 uppercase">Memory Bank</h3>
        <div id="chat-history-list" class="flex-1 overflow-y-auto space-y-3 text-sm text-slate-300">
            <p class="italic text-xs opacity-50">Memory Empty</p>
        </div>
        <button onclick="clearMemory()" class="mt-4 w-full py-3 rounded-xl border border-red-900/30 text-red-500 text-xs font-bold uppercase tracking-tighter">Wipe Memory</button>
    </div>

    <button id="menu-toggle"><span></span><span></span><span></span></button>

    <div id="privacy-modal">
        <div class="modal-content">
            <div class="text-5xl mb-5">🛡️</div>
            <h2 class="text-2xl font-black mb-3 text-cyan-400 uppercase tracking-tighter">Privacy Shield</h2>
            <p class="text-[10px] text-slate-400 mb-8 uppercase tracking-wider">On-device biometric processing active.</p>
            <button id="agree-btn" class="bg-white text-black w-full py-4 rounded-full font-black">INITIALIZE SECURELY</button>
        </div>
    </div>

    <div id="phone-wrapper">
        <div id="onboarding">
            <h1 class="text-5xl font-black mb-4">Emote Bro ☺️</h1>
            <p class="text-cyan-400 font-medium tracking-[0.2em] uppercase text-[10px]" id="load-status">Priming Neural Core<span class="loader-dots">...</span></p>
            <button id="launch-btn" class="mt-14 bg-white text-black px-12 py-4 rounded-full font-black opacity-30 pointer-events-none transition-all">WAITING FOR MODELS</button>
        </div>

        <div id="app">
            <div class="panel-vision">
                <div class="view-circle" id="borderFrame">
                    <video id="webcam" autoplay playsinline muted></video>
                </div>
                <div id="mood-label">Neural Vision Active</div>
                <div class="flex gap-6 mt-4">
                    <button id="camBtn" class="control-btn">📷</button>
                    <button id="micBtn" class="control-btn">🎤</button>
                </div>
            </div>

            <div class="panel-advice">
                <p id="advice-display" class="text-md font-medium italic text-slate-200">System ready for input...</p>
            </div>

            <div class="panel-input">
                <div class="flex justify-between items-center mb-2 px-1">
                    <h2 class="text-[9px] font-black tracking-widest text-slate-500 uppercase">Input Terminal</h2>
                    <span class="text-[8px] text-cyan-500 font-bold uppercase">Encrypted</span>
                </div>
                <input type="text" id="user-text" placeholder="Share your inner state..." autocomplete="off">
            </div>
        </div>
    </div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const BACKEND_URL = "https://emotebro-finallaunch.onrender.com/analyze";
    let faceLandmarker, video = document.getElementById("webcam"), currentMood = "Neutral";
    let camStream = null, isRecording = false, mediaRecorder, audioChunks = [];

    // --- SESSION ID LOGIC ---
    if (!localStorage.getItem('device_id')) {
        localStorage.setItem('device_id', 'dev_' + Math.random().toString(36).substr(2, 9));
    }
    const DEVICE_ID = localStorage.getItem('device_id');

    // 1. BACKGROUND PRE-LOADING START
    const visionPromise = FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    
    fetch(BACKEND_URL, { 
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ ping: true, session_id: DEVICE_ID }) 
    }).catch(() => {});

    let landmarkerPromise = (async () => {
        const vision = await visionPromise;
        const lm = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
            outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1
        });
        
        const btn = document.getElementById('launch-btn');
        btn.innerText = "LAUNCH ME";
        btn.classList.remove('opacity-30', 'pointer-events-none');
        document.getElementById('load-status').innerText = "Affective Engine Ready";
        return lm;
    })();

    // UI Navigation & Privacy Shield Fix
    document.getElementById('launch-btn').onclick = () => {
        if (!localStorage.getItem('privacy_agreed')) {
            document.getElementById('privacy-modal').classList.add('show');
        } else { launchApp(); }
    };

    document.getElementById('agree-btn').onclick = () => {
        localStorage.setItem('privacy_agreed', 'true');
        document.getElementById('privacy-modal').classList.remove('show');
        launchApp();
    };

    const launchApp = async () => {
        document.getElementById('onboarding').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        faceLandmarker = await landmarkerPromise; 
    };

    // Sidebar Logic
    const menuBtn = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    menuBtn.onclick = () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); updateHistoryUI(); };
    overlay.onclick = menuBtn.onclick;

    // Camera Logic
    document.getElementById('camBtn').onclick = async () => {
        if (camStream) {
            camStream.getTracks().forEach(t => t.stop()); camStream = null;
            document.getElementById('camBtn').classList.remove('active');
        } else {
            camStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = camStream;
            document.getElementById('camBtn').classList.add('active');
            video.onloadedmetadata = () => runDetection();
        }
    };

    function runDetection() {
        if (!camStream || !faceLandmarker) return;
        const result = faceLandmarker.detectForVideo(video, performance.now());
        if (result.faceBlendshapes?.length > 0) {
            const s = result.faceBlendshapes[0].categories.reduce((acc, c) => (acc[c.categoryName] = c.score, acc), {});
            let instant = "Neutral";
            if (s.jawOpen > 0.45) instant = "Surprised";
            else if ((s.mouthSmileLeft + s.mouthSmileRight)/2 > 0.25) instant = "Happy";
            else if (s.browInnerUp > 0.4) instant = "Sad";
            else if ((s.browDownLeft + s.browDownRight)/2 > 0.3) instant = "Frustrated";

            if (instant !== currentMood) {
                currentMood = instant;
                document.body.className = `theme-${instant.toLowerCase()}`;
                document.getElementById('mood-label').innerText = `LOCKED: ${instant}`;
            }
        }
        requestAnimationFrame(runDetection);
    }

    // Mic Logic
    document.getElementById('micBtn').onclick = async () => {
        const btn = document.getElementById('micBtn');
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const formData = new FormData();
                formData.append('audio', new Blob(audioChunks, { type: 'audio/webm' }));
                formData.append('face', currentMood);
                formData.append('session_id', DEVICE_ID); // Sending device ID
                sendRequest(formData, true);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            isRecording = true; btn.classList.add('active');
        } else {
            mediaRecorder.stop(); isRecording = false; btn.classList.remove('active');
        }
    };

    document.getElementById('user-text').onkeypress = (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const text = e.target.value; e.target.value = "";
            sendRequest(JSON.stringify({ text, face: currentMood, session_id: DEVICE_ID }), false);
        }
    };

    async function sendRequest(payload, isVoice) {
        document.getElementById('advice-display').innerText = "Syncing...";
        try {
            const options = { method: 'POST', body: payload };
            if (!isVoice) options.headers = {'Content-Type': 'application/json'};
            const res = await fetch(BACKEND_URL, options);
            const data = await res.json();
            typeWriter(data.advice);
            saveChat(isVoice ? "🎤 Voice Note" : "Text Input", data.advice);
        } catch (err) { typeWriter("Hub connection weak."); }
    }

    function typeWriter(text) {
        const el = document.getElementById('advice-display'); el.innerHTML = "";
        let i = 0; const itv = setInterval(() => {
            if (i < text.length) el.innerHTML += text.charAt(i++);
            else { clearInterval(itv); el.scrollTop = el.scrollHeight; }
        }, 40);
    }

    function saveChat(u, a) {
        const h = JSON.parse(localStorage.getItem('emote_chats') || "[]");
        h.unshift({ u, a }); localStorage.setItem('emote_chats', JSON.stringify(h.slice(0, 10)));
    }

    function updateHistoryUI() {
        const h = JSON.parse(localStorage.getItem('emote_chats') || "[]");
        document.getElementById('chat-history-list').innerHTML = h.map(i => `
            <div class="p-3 bg-white/5 rounded-xl border border-white/5">
                <p class="text-[9px] text-cyan-400 font-bold uppercase">${i.u}</p>
                <p class="text-[11px] text-slate-300 mt-1">${i.a}</p>
            </div>`).join('') || '<p class="italic text-xs opacity-50 text-center">Memory Empty</p>';
    }

    window.clearMemory = () => { localStorage.removeItem('emote_chats'); updateHistoryUI(); };
</script>
</body>
</html>
