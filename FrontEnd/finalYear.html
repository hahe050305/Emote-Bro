<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emote Bro | Affective Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-neutral: #050506; --accent: #06b6d4; --glass: rgba(20, 20, 25, 0.8); }
        .theme-happy { --bg-current: #06241c; --accent: #10b981; }
        .theme-sad { --bg-current: #0a1128; --accent: #3b82f6; }
        .theme-frustrated { --bg-current: #240a0a; --accent: #ef4444; }
        .theme-surprised { --bg-current: #24180a; --accent: #f59e0b; }
        
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; height: 100%; overflow: hidden; }
        
        #phone-wrapper { width: 100%; height: 100%; background: var(--bg-current, var(--bg-neutral)); transition: background 1.5s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Onboarding - Centered subheading fix */
        #onboarding { position: absolute; inset: 0; z-index: 50; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .fade-in { animation: fadeIn 1.5s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Main Intact Layout */
        #app { 
            display: none; 
            flex-direction: column; 
            width: 100%; 
            height: 100%; 
            padding: 15px;
            gap: 12px;
            box-sizing: border-box;
        }
        
        @media (min-width: 1024px) {
            #app { grid-template-columns: 320px 1fr 320px; flex-direction: row; align-items: stretch; }
        }

        /* Responsive Panel Sizes for "No Scroll" layout */
        .panel-vision { flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .panel-advice { flex: 0.8; background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .panel-input { flex: 0.7; background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }

        /* Circular Vision Frame */
        .view-circle { 
            width: 50vw; height: 50vw; 
            max-width: 260px; max-height: 260px;
            border-radius: 50%; overflow: hidden; border: 3px solid #fff; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; 
            transition: all 0.8s ease;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .control-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .control-btn.active { background: var(--accent); color: white; border-color: white; box-shadow: 0 0 20px var(--accent); }
        
        #user-text { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; width: 100%; outline: none; text-align: center; font-size: 0.9rem; }
        #mood-label { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 10px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body class="theme-neutral">
    <div id="phone-wrapper">
        <div id="onboarding">
            <h1 class="text-5xl font-black mb-4 fade-in">Emote Bro 🫣</h1>
            <p class="text-cyan-400 font-medium tracking-[0.2em] uppercase fade-in text-sm w-full max-w-xs mx-auto" style="animation-delay: 0.5s">
                Emote to Demote your feelings
            </p>
            <button id="launch-btn" class="mt-12 bg-white text-black px-10 py-4 rounded-full font-bold active:scale-95 transition-all fade-in" style="animation-delay: 1s">LAUNCH ME</button>
        </div>

        <div id="app">
            <div class="panel-vision">
                <div class="view-circle" id="borderFrame">
                    <video id="webcam" autoplay playsinline muted></video>
                </div>
                <div id="mood-label">System Initializing...</div>
                <div class="flex gap-6 mt-4">
                    <button id="camBtn" class="control-btn">📷</button>
                    <button id="micBtn" class="control-btn">🎤</button>
                </div>
            </div>

            <div class="panel-advice">
                <p id="advice-display" class="text-md text-center font-medium italic text-slate-200 px-4">Ready to listen...</p>
            </div>

            <div class="panel-input">
                <div class="flex justify-between items-center mb-2 px-2">
                    <h2 class="text-[9px] font-black tracking-widest text-slate-500 uppercase">Neural Input</h2>
                    <button onclick="clearMemory()" class="text-[9px] text-red-500 font-bold uppercase">Clear History</button>
                </div>
                <input type="text" id="user-text" placeholder="Share your thoughts...">
                <p class="text-[8px] text-center text-slate-600 mt-2 uppercase tracking-widest">Press Enter to process</p>
            </div>
        </div>
    </div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    let faceLandmarker, video = document.getElementById("webcam"), currentMood = "Neutral";
    let camStream = null, micStream = null, mediaRecorder, audioChunks = [], voteBuffer = [];
    let lastLockInUpdate = 0, lockInDuration = 1800;

    // YOUR URL HERE
    const BACKEND_URL = "https://emotebro-finallaunch.onrender.com/analyze";

    document.getElementById('launch-btn').addEventListener('click', async () => {
        document.getElementById('onboarding').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('onboarding').remove(); 
            document.getElementById('app').style.display = 'flex'; 
        }, 800);

        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
            outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1
        });
    });

    document.getElementById('camBtn').addEventListener('click', async () => {
        if (camStream) {
            camStream.getTracks().forEach(t => t.stop()); camStream = null;
            document.getElementById('camBtn').classList.remove('active');
        } else {
            camStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = camStream; document.getElementById('camBtn').classList.add('active');
            video.onloadedmetadata = () => runDetection();
        }
    });

    function runDetection() {
        if (!camStream || !faceLandmarker) return;
        const result = faceLandmarker.detectForVideo(video, performance.now());
        if (result.faceBlendshapes?.length > 0) {
            const s = result.faceBlendshapes[0].categories.reduce((acc, c) => (acc[c.categoryName] = c.score, acc), {});
            let instant = "Neutral";
            
            if (s.jawOpen > 0.45) instant = "Surprised";
            else if ((s.mouthSmileLeft + s.mouthSmileRight)/2 > 0.3) instant = "Happy";
            else if (s.browInnerUp > 0.45) instant = "Sad";
            else if ((s.browDownLeft + s.browDownRight)/2 > 0.25) instant = "Frustrated";

            voteBuffer.push(instant);
            if (voteBuffer.length > 22) {
                const winner = voteBuffer.reduce((a, b, i, arr) => (arr.filter(v => v===a).length >= arr.filter(v => v===b).length ? a : b));
                const now = Date.now();
                if (winner !== currentMood && (now - lastLockInUpdate > lockInDuration)) {
                    currentMood = winner;
                    lastLockInUpdate = now;
                    document.body.className = `theme-${winner.toLowerCase()}`;
                    document.getElementById('mood-label').innerText = `LOCKED: ${winner}`;
                    document.getElementById('borderFrame').style.borderColor = "var(--accent)";
                }
                voteBuffer.shift();
            }
        }
        requestAnimationFrame(runDetection);
    }

    document.getElementById('user-text').onkeypress = async (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const text = e.target.value; e.target.value = "";
            processAnalysis({ text, face: currentMood });
        }
    };

    async function processAnalysis(payload) {
        document.getElementById('advice-display').innerText = "Processing...";
        try {
            const res = await fetch(BACKEND_URL, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            typeWriter(data.advice);
        } catch (err) {
            typeWriter("System connection timeout. Check backend.");
        }
    }

    function typeWriter(text) {
        const el = document.getElementById('advice-display'); el.innerHTML = "";
        let i = 0; const itv = setInterval(() => {
            if (i < text.length) el.innerHTML += text.charAt(i++);
            else clearInterval(itv);
        }, 30);
    }

    window.clearMemory = () => { if(confirm("Clear local cache?")) localStorage.clear(); };
</script>
</body>
</html>
