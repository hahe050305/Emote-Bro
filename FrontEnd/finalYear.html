<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emote Bro | Affective Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-neutral: #050506; --accent: #06b6d4; --glass: rgba(20, 20, 25, 0.8); }
        .theme-happy { --bg-current: #06241c; --accent: #10b981; }
        .theme-sad { --bg-current: #0a1128; --accent: #3b82f6; }
        .theme-frustrated { --bg-current: #240a0a; --accent: #ef4444; }
        .theme-surprised { --bg-current: #24180a; --accent: #f59e0b; }
        
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        
        #phone-wrapper { width: 100%; height: 100%; background: var(--bg-current, var(--bg-neutral)); transition: background 1.5s ease; display: flex; flex-direction: column; position: relative; }

        /* Gemini-style Sidebar (Memory Bank) */
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #0a0a0c; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(255,255,255,0.1); padding: 60px 20px 20px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(4px); }
        .sidebar-overlay.open { display: block; }
        #menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 210; width: 45px; height: 45px; background: var(--glass); border-radius: 12px; display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        #menu-toggle span { width: 20px; height: 2px; background: white; border-radius: 2px; transition: 0.3s; }

        /* Privacy Shield Pop-up */
        #privacy-modal { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(15px); }
        .modal-content { background: #0f172a; border: 1px solid rgba(6, 182, 212, 0.3); padding: 35px; border-radius: 40px; max-width: 350px; text-align: center; transform: scale(0.9); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #privacy-modal.show .modal-content { transform: scale(1); }

        /* App Layout - Optimized for "Intact" View */
        #app { display: none; flex: 1; flex-direction: column; height: 100%; width: 100%; padding: 15px; gap: 10px; box-sizing: border-box; justify-content: space-between; }
        
        /* Vision Section: Shrinks if needed */
        .panel-vision { flex: 2; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .view-circle { width: 45vw; height: 45vw; max-width: 220px; max-height: 220px; border-radius: 50%; overflow: hidden; border: 3px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Advice Section: Scrollable if text is long */
        .panel-advice { flex: 1.2; min-height: 100px; background: var(--glass); backdrop-filter: blur(30px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; align-items: center; justify-content: center; overflow-y: auto; text-align: center; }
        
        /* Input Section: Locked at bottom */
        .panel-input { flex-shrink: 0; background: var(--glass); backdrop-filter: blur(30px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 12px; margin-bottom: env(safe-area-inset-bottom, 10px); }

        .control-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .control-btn.active { background: var(--accent); border-color: white; box-shadow: 0 0 20px var(--accent); }
        
        #user-text { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; width: 100%; outline: none; text-align: center; color: white; font-size: 16px; }
        #mood-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.4em; margin-top: 10px; color: var(--accent); text-transform: uppercase; }

        #onboarding { position: absolute; inset: 0; z-index: 50; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body class="theme-neutral">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="sidebar">
        <h3 class="text-xs font-black tracking-widest text-slate-500 mb-6 uppercase">Memory Bank</h3>
        <div id="chat-history-list" class="flex-1 overflow-y-auto space-y-3 text-sm text-slate-300">
            <p class="italic text-xs opacity-50">No logs found...</p>
        </div>
        <button onclick="clearMemory()" class="mt-4 w-full py-3 rounded-xl border border-red-900/30 text-red-500 text-xs font-bold uppercase tracking-tighter">Wipe Memory</button>
    </div>

    <button id="menu-toggle">
        <span></span><span></span><span></span>
    </button>

    <div id="privacy-modal">
        <div class="modal-content">
            <div class="text-5xl mb-5">🛡️</div>
            <h2 class="text-2xl font-black mb-3 text-cyan-400 uppercase tracking-tighter">Privacy Shield</h2>
            <p class="text-[10px] text-slate-400 mb-8 leading-relaxed uppercase tracking-wider">
                Facial analysis & Neural sessions are processed on-device. Your biometrics never leave this terminal.
            </p>
            <button id="agree-btn" class="bg-white text-black w-full py-4 rounded-full font-black active:scale-95 transition-all">INITIALIZE SECURELY</button>
        </div>
    </div>

    <div id="phone-wrapper">
        <div id="onboarding">
            <h1 class="text-5xl font-black mb-4 fade-in">Emote Bro ☺️</h1>
            <p class="text-cyan-400 font-medium tracking-[0.2em] uppercase fade-in text-[10px]" style="animation-delay: 0.5s">Emote to Demote your feelings</p>
            <button id="launch-btn" class="mt-14 bg-white text-black px-12 py-4 rounded-full font-black active:scale-90 transition-all fade-in" style="animation-delay: 1s">LAUNCH ME</button>
        </div>

        <div id="app">
            <div class="panel-vision">
                <div class="view-circle" id="borderFrame">
                    <video id="webcam" autoplay playsinline muted></video>
                </div>
                <div id="mood-label">Awaiting Vision...</div>
                <div class="flex gap-6 mt-4">
                    <button id="camBtn" class="control-btn">📷</button>
                    <button id="micBtn" class="control-btn">🎤</button>
                </div>
            </div>

            <div class="panel-advice">
                <p id="advice-display" class="text-md font-medium italic text-slate-200 leading-snug">System ready for input...</p>
            </div>

            <div class="panel-input">
                <div class="flex justify-between items-center mb-2 px-1">
                    <h2 class="text-[9px] font-black tracking-widest text-slate-500 uppercase">Input Terminal</h2>
                    <span class="text-[8px] text-cyan-500 font-bold uppercase" id="conn-status">Encrypted Hub</span>
                </div>
                <input type="text" id="user-text" placeholder="Share your inner state..." autocomplete="off">
            </div>
        </div>
    </div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    let faceLandmarker, video = document.getElementById("webcam"), currentMood = "Neutral";
    let camStream = null, voteBuffer = [], lastLockInUpdate = 0, lockInDuration = 1800;

    const BACKEND_URL = "https://emotebro-finallaunch.onrender.com/analyze";

    // Sidebar Logic
    const menuBtn = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    const toggleSidebar = () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
        updateHistoryUI();
    };
    menuBtn.onclick = toggleSidebar;
    overlay.onclick = toggleSidebar;

    const launchApp = async () => {
        document.getElementById('onboarding').remove(); 
        document.getElementById('app').style.display = 'flex'; 

        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
            outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1
        });
    };

    document.getElementById('launch-btn').addEventListener('click', () => {
        if (!localStorage.getItem('privacy_agreed')) {
            document.getElementById('privacy-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('privacy-modal').classList.add('show'), 10);
        } else { launchApp(); }
    });

    document.getElementById('agree-btn').addEventListener('click', () => {
        localStorage.setItem('privacy_agreed', 'true');
        document.getElementById('privacy-modal').remove();
        launchApp();
    });

    document.getElementById('camBtn').addEventListener('click', async () => {
        if (camStream) {
            camStream.getTracks().forEach(t => t.stop()); camStream = null;
            document.getElementById('camBtn').classList.remove('active');
        } else {
            camStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = camStream; document.getElementById('camBtn').classList.add('active');
            video.onloadedmetadata = () => runDetection();
        }
    });

    function runDetection() {
        if (!camStream || !faceLandmarker) return;
        const result = faceLandmarker.detectForVideo(video, performance.now());
        if (result.faceBlendshapes?.length > 0) {
            const s = result.faceBlendshapes[0].categories.reduce((acc, c) => (acc[c.categoryName] = c.score, acc), {});
            let instant = "Neutral";
            if (s.jawOpen > 0.4) instant = "Surprised";
            else if ((s.mouthSmileLeft + s.mouthSmileRight)/2 > 0.2) instant = "Happy";
            else if (s.browInnerUp > 0.4) instant = "Sad";
            else if ((s.browDownLeft + s.browDownRight)/2 > 0.25) instant = "Frustrated";

            voteBuffer.push(instant);
            if (voteBuffer.length > 18) {
                const winner = voteBuffer.reduce((a, b, i, arr) => (arr.filter(v => v===a).length >= arr.filter(v => v===b).length ? a : b));
                const now = Date.now();
                if (winner !== currentMood && (now - lastLockInUpdate > lockInDuration)) {
                    currentMood = winner;
                    lastLockInUpdate = now;
                    document.body.className = `theme-${winner.toLowerCase()}`;
                    document.getElementById('mood-label').innerText = `LOCKED: ${winner}`;
                }
                voteBuffer.shift();
            }
        }
        requestAnimationFrame(runDetection);
    }

    document.getElementById('user-text').onkeypress = async (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const text = e.target.value; e.target.value = "";
            processAnalysis(text);
        }
    };

    async function processAnalysis(text) {
        document.getElementById('advice-display').innerText = "Analyzing Pulse...";
        try {
            const res = await fetch(BACKEND_URL, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, face: currentMood })
            });
            const data = await res.json();
            saveChat(text, data.advice);
            typeWriter(data.advice);
        } catch (err) {
            typeWriter("Hub connection weak. Check connectivity.");
        }
    }

    function typeWriter(text) {
        const el = document.getElementById('advice-display'); el.innerHTML = "";
        let i = 0; const itv = setInterval(() => {
            if (i < text.length) el.innerHTML += text.charAt(i++);
            else { clearInterval(itv); el.scrollTop = el.scrollHeight; }
        }, 35);
    }

    function saveChat(user, ai) {
        const history = JSON.parse(localStorage.getItem('emote_chats') || "[]");
        history.unshift({ user, ai, time: new Date().toLocaleTimeString() });
        localStorage.setItem('emote_chats', JSON.stringify(history.slice(0, 10)));
    }

    function updateHistoryUI() {
        const history = JSON.parse(localStorage.getItem('emote_chats') || "[]");
        const list = document.getElementById('chat-history-list');
        list.innerHTML = history.length ? history.map(h => `
            <div class="p-3 bg-white/5 rounded-xl border border-white/5">
                <p class="text-[10px] text-cyan-400 font-bold">${h.user}</p>
                <p class="text-[11px] text-slate-400 mt-1">${h.ai.substring(0,60)}...</p>
            </div>
        `).join('') : '<p class="italic text-xs opacity-50">Memory Empty</p>';
    }

    window.clearMemory = () => { if(confirm("Wipe all neural logs?")) { localStorage.clear(); updateHistoryUI(); } };
</script>
</body>
</html>
